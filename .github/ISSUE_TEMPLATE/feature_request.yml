name: 💡 功能建议
description: 为 CloudFlareScan 提出一个新功能或改进
title: "[Feat]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请告诉我们你想看到什么功能。

  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 这个功能解决了什么问题？当前有什么不便？
      placeholder: 每次扫描后需要手动导出结果，很麻烦……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你想象中的解决方案是什么样？
      placeholder: 添加一个「自动导出为 CSV」的选项
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他方式可以实现类似效果？

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 截图、示例代码或其他上下文
