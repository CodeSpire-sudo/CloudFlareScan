name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check CloudFlareScan.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install aiohttp PySide6 types-requests
      - name: Type check with mypy
        continue-on-error: true  # PySide6 类型复杂，允许不通过
        run: mypy CloudFlareScan.py --ignore-missing-imports

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxcb-xinerama0 libegl1 libgl1-mesa-glx xvfb
          python -m pip install --upgrade pip
          pip install aiohttp PySide6
      - name: Verify import (headless)
        run: |
          xvfb-run python -c "import sys; sys.path.insert(0, '.'); import CloudFlareScan; print('✅ Module loaded successfully'); print(f'Functions/classes: {len([x for x in dir(CloudFlareScan) if not x.startswith(\"_\")])}')"
